<!DOCTYPE html>
<html>
<head>
    <title>Burger Menu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .food-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .food-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .food-item h3 {
            margin: 10px 0 5px;
        }

        .food-item p {
            margin: 5px 0;
            font-weight: bold;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        .back-btn {
            margin: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>🍔 Burger Menu</h1>

<div class="menu-container">

    <div class="food-item">
        <img src="images/burger/classic.jpg" alt="Classic Burger">
        <h3>Classic Burger</h3>
        <p>₹149</p>
        <button onclick="addToCart('Classic Burger',149)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/burger/steakhouse.jpg" alt="Steakhouse Burger">
        <h3>Steakhouse Burger</h3>
        <p>₹199</p>
        <button onclick="addToCart('Steakhouse Burger',199)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/burger/veggie.jpg" alt="Veggie Burger">
        <h3>Veggie Burger</h3>
        <p>₹129</p>
        <button onclick="addToCart('Veggie Burger',129)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/burger/bbq.jpg" alt="BBQ Burger">
        <h3>BBQ Burger</h3>
        <p>₹179</p>
        <button onclick="addToCart('BBQ Burger',179)">Add to Cart</button>
    </div>

</div>

<a href="index.html" class="back-btn">
    <button>⬅ Back to Home</button>
</a>

<script src="script.js"></script>

</body>
</html>
