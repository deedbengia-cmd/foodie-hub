<!DOCTYPE html>
<html>
<head>
    <title>Beverages Menu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .food-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .food-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .food-item h3 {
            margin: 10px 0 5px;
        }

        .food-item p {
            margin: 5px 0;
            font-weight: bold;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        .back-btn {
            margin: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>🥤 Beverages Menu</h1>

<div class="menu-container">

    <div class="food-item">
        <img src="images/beverages/coffee.jpg" alt="Coffee">
        <h3>Coffee</h3>
        <p>₹80</p>
        <button onclick="addToCart('Coffee',80)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/beverages/tea.jpg" alt="Tea">
        <h3>Tea</h3>
        <p>₹50</p>
        <button onclick="addToCart('Tea',50)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/beverages/mojito.jpg" alt="Mojito">
        <h3>Mojito</h3>
        <p>₹120</p>
        <button onclick="addToCart('Mojito',120)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/beverages/softdrink.jpg" alt="Soft Drink">
        <h3>Soft Drink</h3>
        <p>₹60</p>
        <button onclick="addToCart('Soft Drink',60)">Add to Cart</button>
    </div>

</div>

<a href="index.html" class="back-btn">
    <button>⬅ Back to Home</button>
</a>

<script src="script.js"></script>

</body>
</html>
