<!DOCTYPE html>
<html>
<head>
    <title>Pizza Menu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .food-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .food-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .food-item h3 {
            margin: 10px 0 5px;
        }

        .food-item p {
            margin: 5px 0;
            font-weight: bold;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        .back-btn {
            margin: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>🍕 Pizza Menu</h1>

<div class="menu-container">

    <div class="food-item">
        <img src="images/pizza/margarita.jpg" alt="Margarita Pizza">
        <h3>Margarita Pizza</h3>
        <p>₹199</p>
        <button onclick="addToCart('Margarita Pizza',199)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/pizza/buffalo.jpg" alt="Buffalo Pizza">
        <h3>Buffalo Pizza</h3>
        <p>₹249</p>
        <button onclick="addToCart('Buffalo Pizza',249)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/pizza/cheese.jpg" alt="Cheese Pizza">
        <h3>Cheese Pizza</h3>
        <p>₹179</p>
        <button onclick="addToCart('Cheese Pizza',179)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/pizza/paneer.jpg" alt="Paneer Pizza">
        <h3>Paneer Pizza</h3>
        <p>₹229</p>
        <button onclick="addToCart('Paneer Pizza',229)">Add to Cart</button>
    </div>

</div>

<a href="index.html" class="back-btn">
    <button>⬅ Back to Home</button>
</a>

<script src="script.js"></script>

</body>
</html>
