<!DOCTYPE html>
<html>
<head>
  <title>Pizza - Premium Food App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="home.html">Home</a>
  <a href="cart.html">Cart</a>
</nav>

<h1>🍕 Pizzas</h1>

<div class="container">

  <!-- Margarita Pizza -->
  <div class="card">
    <img src="images/margarita.jpg" alt="Margarita Pizza">
    <h3>Margarita Pizza</h3>
    <p>Small: ₹250 | Large: ₹450</p>
    <label>Size: 
      <select id="size1">
        <option value="250">Small</option>
        <option value="450">Large</option>
      </select>
    </label>
    <input type="number" id="qty1" value="1" min="1">
    <button onclick="addToCart('Margarita Pizza', 'size1', 'qty1')">Add to Cart</button>
  </div>

  <!-- Buffalo Pizza -->
  <div class="card">
    <img src="images/buffalo.jpg" alt="Buffalo Pizza">
    <h3>Buffalo Pizza</h3>
    <p>Small: ₹300 | Large: ₹550</p>
    <label>Size: 
      <select id="size2">
        <option value="300">Small</option>
        <option value="550">Large</option>
      </select>
    </label>
    <input type="number" id="qty2" value="1" min="1">
    <button onclick="addToCart('Buffalo Pizza', 'size2', 'qty2')">Add to Cart</button>
  </div>

  <!-- Cheese Pizza -->
  <div class="card">
    <img src="images/cheese.jpg" alt="Cheese Pizza">
    <h3>Cheese Pizza</h3>
    <p>Small: ₹100 | Large: ₹180</p>
    <label>Size: 
      <select id="size3">
        <option value="100">Small</option>
        <option value="180">Large</option>
      </select>
    </label>
    <input type="number" id="qty3" value="1" min="1">
    <button onclick="addToCart('Cheese Pizza', 'size3', 'qty3')">Add to Cart</button>
  </div>

  <!-- Paneer Pizza -->
  <div class="card">
    <img src="images/paneer.jpg" alt="Paneer Pizza">
    <h3>Paneer Pizza</h3>
    <p>Small: ₹150 | Large: ₹280</p>
    <label>Size: 
      <select id="size4">
        <option value="150">Small</option>
        <option value="280">Large</option>
      </select>
    </label>
    <input type="number" id="qty4" value="1" min="1">
    <button onclick="addToCart('Paneer Pizza', 'size4', 'qty4')">Add to Cart</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
