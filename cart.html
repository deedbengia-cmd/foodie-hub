<!DOCTYPE html>
<html>
<head>
  <title>Cart - Premium Food App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="home.html">Home</a>
</nav>

<h1>Your Cart</h1>

<div id="cart-container" class="container">
  <!-- Cart items appear here -->
</div>

<h2 id="total">Total: ₹0</h2>

<!-- ================= DELIVERY DETAILS ================= -->

<div class="payment-box">

  <h2>Delivery Details</h2>

  <input type="text" id="custName" placeholder="Full Name">
  <input type="text" id="custPhone" placeholder="Phone Number">
  <textarea id="custAddress" placeholder="Full Delivery Address"></textarea>
  <input type="text" id="landmark" placeholder="Landmark (Optional)">

  <h3 style="margin-top:30px;">Scan & Pay via UPI</h3>

  <img src="images/qr.png"
       alt="UPI QR"
       class="qr-image">

  <p class="upi-id">UPI ID: UPI ID: <strong>deedbengia@okaxis</strong>

  <button onclick="confirmOrder()">I Have Paid</button>

</div>

<script src="script.js"></script>

</body>
</html>
