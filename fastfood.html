<!DOCTYPE html>
<html>
<head>
    <title>Fast Food Menu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .food-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .food-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .food-item h3 {
            margin: 10px 0 5px;
        }

        .food-item p {
            margin: 5px 0;
            font-weight: bold;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        .back-btn {
            margin: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>🍜 Fast Food Menu</h1>

<div class="menu-container">

    <div class="food-item">
        <img src="images/fastfood/chow.jpg" alt="Chow Noodles">
        <h3>Chow Noodles</h3>
        <p>₹120</p>
        <button onclick="addToCart('Chow Noodles',120)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/fastfood/momos.jpg" alt="Momos">
        <h3>Momos</h3>
        <p>₹100</p>
        <button onclick="addToCart('Momos',100)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/fastfood/thukpa.jpg" alt="Thukpa">
        <h3>Thukpa</h3>
        <p>₹150</p>
        <button onclick="addToCart('Thukpa',150)">Add to Cart</button>
    </div>

    <div class="food-item">
        <img src="images/fastfood/friedrice.jpg" alt="Fried Rice">
        <h3>Fried Rice</h3>
        <p>₹130</p>
        <button onclick="addToCart('Fried Rice',130)">Add to Cart</button>
    </div>

</div>

<a href="index.html" class="back-btn">
    <button>⬅ Back to Home</button>
</a>

<script src="script.js"></script>

</body>
</html>
